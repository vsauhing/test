<!-- File: shared_styles.html -->
<!-- Shared global styles for FCT Spare Part Pricing Generator -->

<style>
  :root {
    --sidebar-width: 72px;
    --sidebar-expanded-width: 240px;
    --crm-red: #b50000;
    --crm-dark: #2f3740;
    --crm-dark-2: #232a31;
    --crm-bg: #f3f4f6;
    --crm-text: #1f2937;
  }

  html,
  body {
    min-height: 100%;
  }

  body {
    margin: 0;
    background: var(--crm-bg);
    color: var(--crm-text);
  }

  .app-shell {
    min-height: 100vh;
  }

  /************************************************************
   * Sidebar shell
   ************************************************************/
  .sidebar {
    position: fixed;
    top: 0;
    left: 0;
    bottom: 0;
    z-index: 1030;
    width: var(--sidebar-width);
    background: linear-gradient(180deg, var(--crm-dark) 0%, var(--crm-dark-2) 100%);
    overflow: hidden;
    transition: width 0.2s ease;

    display: flex;
    flex-direction: column;
  }

  .sidebar:hover {
    width: var(--sidebar-expanded-width);
  }

  .sidebar-nav {
    display: flex;
    flex-direction: column;
  }

  .sidebar-nav-top {
    flex: 1 1 auto;
    padding-top: 10px;
  }

  .sidebar-nav-bottom {
    flex: 0 0 auto;
    margin-top: auto;
    padding-top: 8px;
    padding-bottom: 16px;
    border-top: 1px solid rgba(255, 255, 255, 0.08);
  }

  .sidebar-link {
    height: 40px;
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 0 18px;
    color: #fff;
    text-decoration: none;
    border-left: 4px solid transparent;
    white-space: nowrap;
    transition: background 0.18s ease, border-color 0.18s ease;
  }

  .sidebar-link:hover {
    color: #fff;
    background: rgba(255, 255, 255, 0.08);
  }

  .sidebar-link.active {
    background: var(--crm-red);
    color: #fff;
    border-left-color: #fff;
  }

  .sidebar-link i {
    min-width: 20px;
    text-align: center;
    font-size: 1.25rem;
  }

  .sidebar-link .sidebar-label {
    opacity: 0;
    transform: translateX(-6px);
    transition: opacity 0.18s ease, transform 0.18s ease;
    font-size: 1rem;
    font-weight: 500;
  }

  .sidebar:hover .sidebar-link .sidebar-label {
    opacity: 1;
    transform: translateX(0);
  }

  .sidebar-link-external {
    opacity: 0.95;
  }

  .sidebar-link-external:hover {
    opacity: 1;
  }

  /************************************************************
   * Main page content
   ************************************************************/
  .main-content {
    margin-left: var(--sidebar-width);
    padding: 24px 18px;
    transition: margin-left 0.2s ease;
  }

  .sidebar:hover ~ .main-content {
    margin-left: var(--sidebar-expanded-width);
  }

  .content-card {
    background: #fff;
    border: 1px solid #ddd;
    border-radius: 12px;
    box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
  }

  .page-wrap {
    max-width: 1080px;
    margin: 0 auto;
  }

  .req::after {
    content: " *";
    color: #dc3545;
    font-weight: 700;
  }

  .text-muted-sm {
    font-size: 0.9rem;
  }

  .section-title {
    font-weight: 700;
  }

  .hidden {
    display: none !important;
  }

  /************************************************************
   * Materials UI
   ************************************************************/
  .material-row {
    padding: 12px;
    margin-bottom: 10px;
    border: 1px solid #e5e7eb;
    border-radius: 12px;
    background: #ffffff;
  }

  .material-total {
    background: #f9fafb;
    font-weight: 600;
  }

  .material-comments {
    background: #ffffff;
  }

  /************************************************************
   * Saving / loading overlay
   ************************************************************/
  .loading-overlay {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    background: rgba(255, 255, 255, 0.78);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 9999;
    backdrop-filter: blur(2px);
  }

  .loading-box {
    background: #fff;
    padding: 32px 42px;
    border-radius: 16px;
    box-shadow: 0 12px 28px rgba(0, 0, 0, 0.18);
    min-width: 320px;
    font-weight: 600;
  }

  .loading-box i {
    color: #0d6efd;
  }

  .form-disabled {
    pointer-events: none;
    opacity: 0.65;
  }

  /************************************************************
   * Responsive sidebar behavior
   ************************************************************/
  @media (max-width: 991.98px) {
    .sidebar,
    .sidebar:hover {
      width: var(--sidebar-width);
    }

    .sidebar-link .sidebar-label {
      display: none;
    }

    .main-content,
    .sidebar:hover ~ .main-content {
      margin-left: var(--sidebar-width);
    }
  }
</style>
